name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas anthropic pytest

      - name: Create dummy config for CI
        run: |
          echo 'ANTHROPIC_API_KEY = "dummy-key-for-ci"' > config.py
          echo 'MAX_TOKENS = 1024' >> config.py

      - name: Run tests
        run: pytest tests/ -v
